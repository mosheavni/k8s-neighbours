name: Release

on:
  push:
    tags: ["v*"]
  # manual trigger: pick the tag (not a branch) in the "Run workflow" ref
  # dropdown — GoReleaser requires the checked-out commit to be tagged
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}

  krew:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Update Krew index
        uses: rajatjindal/krew-release-bot@v0.0.51
