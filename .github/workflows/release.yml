name: Release

on:
  push:
    tags: ["v*"]
  # manual trigger: pick the tag (not a branch) in the "Run workflow" ref
  # dropdown — GoReleaser requires the checked-out commit to be tagged
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # this repo is also a self-hosted krew index: the plugins/ directory holds
  # the manifest, regenerated and committed to master on every release
  krew-index:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "$GITHUB_REF_NAME" --pattern checksums.txt --output checksums.txt

      - name: Generate krew manifest
        run: hack/generate-krew-manifest.sh "$GITHUB_REF_NAME" checksums.txt

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/neighbours.yaml
          git diff --cached --quiet && { echo "manifest unchanged"; exit 0; }
          git commit -m "chore: update krew manifest for $GITHUB_REF_NAME"
          git push origin master
