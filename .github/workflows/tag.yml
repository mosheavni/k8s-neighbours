name: Tag Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver level to bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  # needed to dispatch the release workflow: tags pushed with GITHUB_TOKEN
  # do not trigger tag-push workflows themselves
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute next version and push tag
        id: tag
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -1)
          latest=${latest:-v0.0.0}
          IFS=. read -r major minor patch <<< "${latest#v}"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          tag="v${major}.${minor}.${patch}"
          echo "Tagging ${{ github.sha }} as ${tag} (previous: ${latest})"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref "${{ steps.tag.outputs.tag }}"
