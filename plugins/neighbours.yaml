apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: neighbours
spec:
  version: v0.2.0
  homepage: https://github.com/mosheavni/k8s-neighbours
  shortDescription: List pods on the same node as a given pod
  description: |
    Lists all pods scheduled on the same Kubernetes node as a given pod,
    or all pods running on a given node, across all namespaces.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mosheavni/k8s-neighbours/releases/download/v0.2.0/k8s-neighbours_linux_amd64.tar.gz
    sha256: 91520ac23e82778a4fec215f9db9c28433e5302f484c6a93ad0a7e08f4687b97
    bin: kubectl-neighbours
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mosheavni/k8s-neighbours/releases/download/v0.2.0/k8s-neighbours_linux_arm64.tar.gz
    sha256: 30fe4f5c178a520ce474992d33ac154e1499500375767e2bb8d3c452d540a45b
    bin: kubectl-neighbours
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mosheavni/k8s-neighbours/releases/download/v0.2.0/k8s-neighbours_darwin_amd64.tar.gz
    sha256: f3f395ea8cb1f8c358c4a90bb1aeb86e1ee55d6da88faca9e10b8848f593daee
    bin: kubectl-neighbours
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mosheavni/k8s-neighbours/releases/download/v0.2.0/k8s-neighbours_darwin_arm64.tar.gz
    sha256: 93b75ccc2784d4f41286281cb2524c1d92a5f060cc74f91ef3caf0ecc3c557bf
    bin: kubectl-neighbours
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    uri: https://github.com/mosheavni/k8s-neighbours/releases/download/v0.2.0/k8s-neighbours_windows_amd64.zip
    sha256: e79ca0d0ab45f691a90b62be4a22383c282533b1cb16ee6c640be04075e86076
    bin: kubectl-neighbours.exe
  - selector:
      matchLabels:
        os: windows
        arch: arm64
